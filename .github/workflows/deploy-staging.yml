name: Deploy Staging

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push Images
        run: |
          docker buildx build --push -t ghcr.io/${{ github.repository }}/mira-api-gateway:staging ./apps/api-gateway
          docker buildx build --push -t ghcr.io/${{ github.repository }}/mira-ml-service:staging ./services/ml-service
          docker buildx build --push -t ghcr.io/${{ github.repository }}/mira-llm-service:staging ./services/llm-service

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway Staging
        run: |
          railway up --environment staging --service mira-api-gateway
          railway up --environment staging --service mira-ml-service
          railway up --environment staging --service mira-llm-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

  e2e-tests:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps
          
      - name: Run Playwright Tests
        run: npx playwright test
        env:
          BASE_URL: https://staging.mira.yourdomain.com
          
  notify:
    needs: [build-and-deploy, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Staging deployment complete!\n\nEnvironment: https://staging.mira.yourdomain.com\nE2E Tests: ${'${{ needs.e2e-tests.result }}'}`
              })
            }
